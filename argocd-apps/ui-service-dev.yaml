apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ui-service-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Praveenchoudary/hotel-booking-gitops.git
    targetRevision: main
    path: charts/ui-service
    helm:
      valueFiles:
        - values-dev.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
